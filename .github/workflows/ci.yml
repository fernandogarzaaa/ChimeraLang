name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: CLI PyTorch smoke
        run: |
          python -m chimera.cli check examples/mnist_classifier.chimera
          python -m chimera.cli compile examples/mnist_classifier.chimera --backend=pytorch --out=/tmp/mnist_classifier.py
          python -m py_compile /tmp/mnist_classifier.py

      - name: CLI LLVM smoke
        run: |
          python -m chimera.cli compile examples/mnist_classifier.chimera --backend=llvm --out=/tmp/mnist_classifier.ll
          test -s /tmp/mnist_classifier.ll

  package:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chimeralang-dist
          path: dist/*
